name: GSSoC Auto Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

jobs:
  label_gssoc:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Intelligent Auto-Labeling
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const payload = context.payload;
            const isPR = !!payload.pull_request;
            const item = payload.issue || payload.pull_request;
            const title = (item.title || '').toLowerCase();
            const body = (item.body || '').toLowerCase();
            const combined = title + ' ' + body;
            const number = item.number;

            const labelsToAdd = ["gssoc'26"];

            // ──────────────────────────────────────────
            // 1. TYPE DETECTION (title + body analysis)
            // ──────────────────────────────────────────
            const typeSignals = {
              'type:security': [
                'idor', 'xss', 'csrf', 'injection', 'vulnerability', 'cve',
                'auth bypass', 'broken access', 'privilege escalation',
                'unauthenticated', 'unauthorized', 'exploit', 'attack',
                'security', 'credential', 'token leak', 'exposed secret',
                'prompt injection', 'data leak', 'brute force'
              ],
              'type:bug': [
                'bug', 'fix', 'crash', 'error', 'broken', 'not working',
                'fails', 'incorrect', '500 error', '404', '503', 'timeout',
                'blank screen', 'render crash', 'null', 'undefined',
                'regression', 'corrupted', 'malfunction'
              ],
              'type:feature': [
                'feat', 'feature', 'enhancement', 'add support', 'implement',
                'introduce', 'new functionality', 'enable', 'allow users',
                'add ability', 'add option'
              ],
              'type:performance': [
                'performance', 'slow', 'latency', 'timeout', '504',
                'memory leak', 'n+1', 'optimize', 'lazy load', 'cache',
                'bottleneck', 'pagination', 'batch', 'parallel', 'debounce',
                'bundle size', 'lighthouse'
              ],
              'type:docs': [
                'docs', 'documentation', 'readme', 'changelog', 'contributing',
                'jsdoc', 'comment', 'typedoc', 'api docs'
              ],
              'type:refactor': [
                'refactor', 'cleanup', 'restructure', 'reorganize',
                'decouple', 'extract', 'modularize', 'dry principle',
                'code quality', 'technical debt'
              ],
              'type:testing': [
                'test', 'spec', 'coverage', 'unit test', 'integration test',
                'e2e', 'cypress', 'jest', 'vitest', 'playwright'
              ],
              'type:design': [
                'design', 'ui/ux', 'mockup', 'wireframe', 'figma',
                'layout', 'theme', 'dark mode', 'light mode', 'responsive',
                'animation'
              ],
              'type:accessibility': [
                'accessibility', 'a11y', 'wcag', 'aria', 'screen reader'
              ],
              'type:devops': [
                'ci/cd', 'github actions', 'workflow', 'docker', 'deploy',
                'infrastructure', 'devops', 'pipeline', 'build process'
              ]
            };

            let detectedTypes = [];
            for (const [label, keywords] of Object.entries(typeSignals)) {
              const score = keywords.filter(k => combined.includes(k)).length;
              if (score > 0) detectedTypes.push({ label, score });
            }
            detectedTypes.sort((a, b) => b.score - a.score);
            
            // Add top 1-2 type labels (primary type + secondary if strong signal)
            if (detectedTypes.length > 0) {
              labelsToAdd.push(detectedTypes[0].label);
              if (detectedTypes.length > 1 && detectedTypes[1].score >= 2) {
                labelsToAdd.push(detectedTypes[1].label);
              }
            }

            // ──────────────────────────────────────────
            // 2. AREA DETECTION (what part of codebase)
            // ──────────────────────────────────────────
            const areaSignals = {
              'backend': [
                'api', 'route', 'endpoint', 'server', 'database', 'query',
                'drizzle', 'neon', 'postgres', 'migration', 'schema',
                'middleware', 'auth check', 'rate limit'
              ],
              'frontend': [
                'component', 'page', 'ui', 'button', 'modal', 'sidebar',
                'navbar', 'layout', 'css', 'tailwind', 'responsive',
                'landing page', 'dashboard', 'form'
              ],
              'ai': [
                'ai', 'groq', 'llama', 'gpt', 'prompt', 'model', 'inference',
                'moderation', 'embedding', 'vector', 'similarity',
                'video generation', 'tts', 'ocr', 'remotion'
              ],
              'database': [
                'schema', 'table', 'migration', 'foreign key', 'index',
                'constraint', 'cascade', 'drizzle', 'neon', 'orphan',
                'integrity', 'relation'
              ]
            };

            if (!isPR) {
              for (const [label, keywords] of Object.entries(areaSignals)) {
                const score = keywords.filter(k => combined.includes(k)).length;
                if (score >= 2) labelsToAdd.push(label);
              }
            }

            // ──────────────────────────────────────────
            // 3. DIFFICULTY LEVEL (deep semantic analysis)
            // ──────────────────────────────────────────

            // CRITICAL indicators: systemic security flaws, data corruption,
            // architectural failures, production-breaking issues
            const criticalSignals = [
              'data leak', 'credential', 'connection string', 'exposed',
              'unauthenticated', 'privilege escalation', 'data corruption',
              'data loss', 'production down', 'denial of service',
              'race condition', 'deadlock', 'memory explosion',
              'prompt injection', 'sql injection', 'broken access control',
              'fails open', 'fail-open', 'bypass moderation',
              'mass', 'all users', 'entire table', 'entire dataset',
              'no authentication', 'no authorization', 'token leak',
              'systemic', 'architectural', 'foreign key missing',
              'orphan records', 'identity inconsistency',
              'o(n) memory', 'unbounded', 'no pagination at db level'
            ];

            // ADVANCED indicators: multi-system, deep backend,
            // complex algorithms, significant refactoring
            const advancedSignals = [
              'idor', 'security', 'auth', 'real-time', 'websocket',
              'embedding', 'cosine similarity', 'vector', 'de-duplication',
              'notification system', 'email digest', 'background job',
              'inngest', 'distributed lock', 'rate limit', 'redis',
              'video generation', 'remotion', 'tts', 'ocr',
              'migration', 'schema change', 'foreign key', 'cascade',
              'promise.all', 'parallelize', 'concurrency',
              'fallback', 'retry', 'circuit breaker', 'multi-model',
              'streaming', 'sse', 'pagination', 'cursor-based',
              'soft delete', 'audit trail', 'role-based',
              'api route', 'middleware', 'input validation', 'zod',
              'drizzle', 'neon', 'database optimization'
            ];

            // INTERMEDIATE indicators: moderate complexity,
            // single-system changes, standard patterns
            const intermediateSignals = [
              'component', 'hook', 'context', 'state management',
              'form validation', 'character counter', 'clipboard',
              'search', 'filter', 'sort', 'modal', 'toast',
              'loading state', 'skeleton', 'error boundary',
              'responsive', 'dark mode', 'theme', 'animation',
              'chart', 'analytics', 'dashboard', 'profile'
            ];

            // BEGINNER indicators: simple, isolated, cosmetic
            const beginnerSignals = [
              'typo', 'readme', 'comment', 'rename', 'alt text',
              'aria-label', 'tooltip', 'hover', 'color', 'font',
              'spacing', 'padding', 'margin', 'icon', 'logo',
              'link', 'url', 'meta tag', 'title tag', 'seo',
              'robots.txt', 'sitemap', 'changelog', 'contributing',
              'button text', 'placeholder', 'copy change',
              'add class', 'css fix', 'style fix'
            ];

            let criticalScore = criticalSignals.filter(k => combined.includes(k)).length;
            let advancedScore = advancedSignals.filter(k => combined.includes(k)).length;
            let intermediateScore = intermediateSignals.filter(k => combined.includes(k)).length;
            let beginnerScore = beginnerSignals.filter(k => combined.includes(k)).length;

            // Boost scores based on structural signals in the body
            // Files mentioned → indicates complexity
            const fileRefs = (combined.match(/\.(ts|tsx|js|jsx|yml|sql|json)/g) || []).length;
            const codeBlocks = (combined.match(/```/g) || []).length / 2;
            const stepCount = (combined.match(/^\d+\./gm) || []).length;

            if (fileRefs >= 5) criticalScore += 2;
            else if (fileRefs >= 3) advancedScore += 1;

            if (codeBlocks >= 3) advancedScore += 1;
            if (stepCount >= 5) intermediateScore += 1;

            // Body length signals (longer = more complex usually)
            if (body.length > 2000) advancedScore += 1;
            if (body.length > 4000) criticalScore += 1;

            // Security issues should never be beginner
            if (detectedTypes.some(t => t.label === 'type:security')) {
              beginnerScore = 0;
              if (criticalScore < 2) advancedScore += 3;
            }

            // Determine final level
            let level;
            if (criticalScore >= 3) {
              level = 'level:critical';
            } else if (criticalScore >= 2 || advancedScore >= 3) {
              level = 'level:advanced';
              // Promote to critical if security + high impact
              if (detectedTypes.some(t => t.label === 'type:security') && criticalScore >= 1) {
                level = 'level:critical';
              }
            } else if (advancedScore >= 1 || intermediateScore >= 2) {
              level = 'level:intermediate';
            } else if (beginnerScore >= 1) {
              level = 'level:beginner';
            } else {
              level = 'level:intermediate';
            }

            labelsToAdd.push(level);

            // Add beginner-friendly tags only for issues
            if (level === 'level:beginner' && !isPR) {
              labelsToAdd.push('good first issue');
              labelsToAdd.push('beginner friendly');
            }

            // ──────────────────────────────────────────
            // 4. PR-SPECIFIC: Adjust level based on size
            // ──────────────────────────────────────────
            if (isPR) {
              // Fetch current labels to check size
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: number
              });

              const sizeLabel = currentLabels.find(l => l.name.startsWith('size/'));
              if (sizeLabel) {
                const sizeName = sizeLabel.name;
                // Large PRs bump difficulty up by one tier
                // Small PRs can bump down by one tier
                const currentLevelIdx = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'].indexOf(level);
                
                if ((sizeName === 'size/xl' || sizeName === 'size/xxl') && currentLevelIdx < 3) {
                  // Remove old level, bump up
                  const idx = labelsToAdd.indexOf(level);
                  if (idx > -1) labelsToAdd.splice(idx, 1);
                  const bumped = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'][currentLevelIdx + 1];
                  labelsToAdd.push(bumped);
                } else if ((sizeName === 'size/xs' || sizeName === 'size/s') && currentLevelIdx > 0) {
                  // Only bump down if the type is not security
                  if (!detectedTypes.some(t => t.label === 'type:security')) {
                    const idx = labelsToAdd.indexOf(level);
                    if (idx > -1) labelsToAdd.splice(idx, 1);
                    const bumped = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'][currentLevelIdx - 1];
                    labelsToAdd.push(bumped);
                  }
                }
              }
            }

            // ──────────────────────────────────────────
            // 5. APPLY LABELS
            // ──────────────────────────────────────────
            // Deduplicate
            const uniqueLabels = [...new Set(labelsToAdd)];

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              labels: uniqueLabels
            });

            console.log(`Applied labels to #${number}: ${uniqueLabels.join(', ')}`);
